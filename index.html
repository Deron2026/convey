<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI要闻简报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 36px 28px 32px;
            max-width: 480px;
            width: 100%;
        }

        h1 {
            font-size: 22px;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-top: 24px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .link-card:active { transform: scale(0.97); }

        .link-card.com { background: #e8f4fd; color: #1565c0; }
        .link-card.pub { background: #e8f5e9; color: #2e7d32; }
        .link-card.tec { background: #fce4ec; color: #c62828; }

        .link-card .icon { font-size: 22px; flex-shrink: 0; }

        .audio-section {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .audio-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 12px 16px;
        }

        .audio-label {
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        audio {
            width: 100%;
            height: 36px;
            border-radius: 8px;
            outline: none;
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #bbb;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #181c24; }
            .container { background: #23283a; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
            h1 { color: #e8eaf6; }
            .subtitle { color: #666; }
            .section-title { color: #555; }
            .link-card.com { background: #1a2a3a; color: #64b5f6; }
            .link-card.pub { background: #1a2e1a; color: #81c784; }
            .link-card.tec { background: #2e1a1a; color: #ef9a9a; }
            .audio-item { background: #1a1e2a; }
            .audio-label { color: #aaa; }
            .footer { color: #444; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 要闻简报</h1>
        <p class="subtitle">每日更新 · 三大版本</p>

        <div class="section-title">阅读全文</div>
        <div class="links">
            <a class="link-card com" href="com.html" target="_blank">
                <span class="icon">&#128188;</span>
                <span>商务版</span>
            </a>
            <a class="link-card pub" href="pub.html" target="_blank">
                <span class="icon">&#128240;</span>
                <span>基础版</span>
            </a>
            <a class="link-card tec" href="tec.html" target="_blank">
                <span class="icon">&#128300;</span>
                <span>技术版</span>
            </a>
        </div>

        <div class="section-title">收听音频</div>
        <div class="audio-section">
            <div class="audio-item">
                <div class="audio-label">&#128188; 商务版</div>
                <audio controls preload="none">
                    <source src="com.wav" type="audio/wav">
                </audio>
            </div>
            <div class="audio-item">
                <div class="audio-label">&#128240; 基础版</div>
                <audio controls preload="none">
                    <source src="pub.wav" type="audio/wav">
                </audio>
            </div>
            <div class="audio-item">
                <div class="audio-label">&#128300; 技术版</div>
                <audio controls preload="none">
                    <source src="tec.wav" type="audio/wav">
                </audio>
            </div>
        </div>

        <div class="footer">Powered by AI · 每日自动更新</div>
    </div>
</body>
</html>
